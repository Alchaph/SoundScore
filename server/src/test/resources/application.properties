spring.application.name=SoundScore
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MariaDB
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false
security.jwt.secret-key=dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RzLW9ubHktbW9yZS1ieXRlcw==
# 1h in millisecond
security.jwt.expiration-time=360000000

spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Disable rate limiting in tests
app.rate-limit.enabled=false
app.seeding.enabled=false
